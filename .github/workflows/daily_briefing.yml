name: Daily Financial Briefing

on:
  schedule:
    # 每日 UTC 22:00 = 台灣時間 06:00
    - cron: "55 21 * * *"
  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning briefing
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
        run: |
          cd briefing
          python main.py

      - name: Publish briefing to GitHub Pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          HTML_FILE=briefing/output/briefing.html

          if [ ! -f "$HTML_FILE" ]; then
            echo "No HTML output found, skipping publish"
            exit 0
          fi

          # Clone financial-analysis-bot
          git clone https://x-access-token:${GH_PAT}@github.com/keigoks-ivan/financial-analysis-bot.git /tmp/fab
          cd /tmp/fab

          # Create briefing directory
          mkdir -p docs/briefing

          # Copy as index.html (latest) and daily archive
          cp "${GITHUB_WORKSPACE}/${HTML_FILE}" docs/briefing/index.html
          cp "${GITHUB_WORKSPACE}/${HTML_FILE}" "docs/briefing/${TODAY}.html"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/briefing/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📰 Morning briefing ${TODAY}"
          git push
